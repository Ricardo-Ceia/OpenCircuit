name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest -q

      - name: Compile backend modules
        run: |
          python -m py_compile main.py app/runtime/main.py app/runtime/server.py app/runtime/settings.py app/http/server_auth.py app/http/server_routes.py app/http/server_ws.py app/network/scanner.py app/network/scan_pipeline.py app/network/lockdownd.py app/network/mac_vendors.py app/network/scan/ping.py app/network/scan/dns.py app/network/scan/arp.py app/network/scan/mdns.py app/network/scan/probe.py app/network/scan/assembly.py app/domain/identity.py app/domain/models.py app/storage/device_history.py app/storage/known_devices.py app/storage/secure_storage.py

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

      - name: Run frontend build
        run: npm run build
